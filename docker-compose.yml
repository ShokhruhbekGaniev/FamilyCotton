services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: familycotton
      POSTGRES_PASSWORD: familycotton_secret
      POSTGRES_DB: familycotton
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - familycotton-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familycotton"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./familycotton-api
    ports:
      - "8082:8082"
    env_file:
      - ./familycotton-api/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - familycotton-net

volumes:
  pgdata:
    external: true
    name: familycotton-api_pgdata

networks:
  familycotton-net:
    driver: bridge
